<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="keepo">
<meta name="theme-color" content="#05070E">
<title>keepo</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 56 56'%3E%3Crect width='56' height='56' rx='13' fill='url(%23g)'/%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%234B7BF5'/%3E%3Cstop offset='.55' stop-color='%237C5CFC'/%3E%3Cstop offset='1' stop-color='%23C84BF5'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='17' y='26' width='22' height='16' rx='4' fill='white' opacity='.95'/%3E%3Cpath d='M20 26v-5a8 8 0 0 1 16 0v5' stroke='white' stroke-width='2.8' fill='none' stroke-linecap='round'/%3E%3Ccircle cx='28' cy='33' r='3.2' fill='%237C5CFC'/%3E%3Crect x='26.6' y='33' width='2.8' height='4' rx='1.2' fill='%237C5CFC'/%3E%3C/svg%3E">
<style>
:root{
  --bg:#05070E;--bg2:#090C18;--card:#0E1120;--card2:#141829;--card3:#1A1F35;
  --border:rgba(255,255,255,.055);--border2:rgba(255,255,255,.1);
  --blue:#4B7BF5;--purple:#7C5CFC;--mauve:#C84BF5;
  --grad:linear-gradient(135deg,#4B7BF5 0%,#7C5CFC 52%,#C84BF5 100%);
  --red:#FF4D6A;--orange:#FF9A3C;--green:#2DD88A;
  --text:#EEF2FF;--text2:#8A9BC0;--text3:#3A4A65;
  --safe:env(safe-area-inset-bottom,0px);--r:20px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Outfit',sans-serif;color:var(--text);overscroll-behavior:none;-webkit-font-smoothing:antialiased}

/* ── SHELL ── */
#app{height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* ── AMBIENT LIGHT ── */
.amb{position:fixed;pointer-events:none;z-index:0;border-radius:50%;filter:blur(90px)}
.amb-1{width:280px;height:280px;background:rgba(75,123,245,.09);top:-60px;right:-40px}
.amb-2{width:220px;height:220px;background:rgba(200,75,245,.06);bottom:120px;left:-60px}

/* ── VIEWS ── */
.view{display:none !important;flex-direction:column;flex:1;overflow:hidden;position:relative;z-index:1}
.view.active{display:flex !important;animation:vIn .24s cubic-bezier(.4,0,.2,1)}
@keyframes vIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── SCROLL ── */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.scroll::-webkit-scrollbar{display:none}
.pad{padding:0 16px 110px}

/* ── NAV ── */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:50;padding:0 12px calc(10px + var(--safe))}
.nav-inner{
  background:rgba(9,12,24,.94);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  border:1px solid var(--border2);border-radius:22px;
  display:flex;justify-content:space-around;align-items:center;padding:8px 0;
}
.nb{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:5px 22px;border:none;background:none;color:var(--text2);font-family:'Outfit',sans-serif;transition:all .2s}
.nb.on{color:var(--blue)}
.nb:active{transform:scale(.88)}
.nb-pip{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:10px;transition:all .22s}
.nb.on .nb-pip{background:rgba(75,123,245,.16)}
.nb-ico{font-size:19px;transition:transform .2s}
.nb.on .nb-ico{transform:scale(1.1)}
.nb-lbl{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}

/* ── TOPBAR ── */
.topbar{padding:52px 18px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo-row{display:flex;align-items:center;gap:10px}
.k-mark{
  width:var(--ksz,34px);height:var(--ksz,34px);
  background:var(--grad);border-radius:calc(var(--ksz,34px)*.24);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;position:relative;overflow:hidden;
  box-shadow:0 6px 22px rgba(75,123,245,.42);
}
.k-mark::after{content:'';position:absolute;inset:0;background:linear-gradient(145deg,rgba(255,255,255,.2) 0%,transparent 55%);pointer-events:none}
.logo-name{font-size:22px;font-weight:900;letter-spacing:-.05em}
.topbar-right{display:flex;gap:8px}
.ico-btn{width:38px;height:38px;background:var(--card);border:1px solid var(--border);border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;transition:all .15s;flex-shrink:0}
.ico-btn:active{transform:scale(.9);background:var(--card2)}

/* ── BACK ROW ── */
.back-row{display:flex;align-items:center;gap:10px;padding:52px 18px 10px;flex-shrink:0;cursor:pointer}
.back-row:active .ba{transform:translateX(-4px)}
.ba{font-size:18px;color:var(--text2);transition:transform .15s}
.back-ttl{font-size:19px;font-weight:800;letter-spacing:-.3px}

/* ── HOME HERO ── */
.hero{
  margin:0 16px 14px;border-radius:26px;padding:22px 20px;
  background:var(--grad);position:relative;overflow:hidden;
  box-shadow:0 18px 52px rgba(75,123,245,.38);
}
.hero::before{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.07)}
.hero::after{content:'';position:absolute;bottom:-35px;left:10px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.04)}
.hero-greet{font-size:12px;font-weight:700;opacity:.72;letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px}
.hero-msg{font-size:24px;font-weight:900;letter-spacing:-.04em;line-height:1.15;margin-bottom:16px}
.hero-row{display:flex;gap:10px}
.hero-stat{background:rgba(255,255,255,.14);backdrop-filter:blur(8px);border-radius:14px;padding:10px 0;flex:1;text-align:center}
.hero-n{font-size:26px;font-weight:900;line-height:1}
.hero-l{font-size:9px;font-weight:700;opacity:.72;text-transform:uppercase;letter-spacing:.05em;margin-top:2px}

/* ── HEALTH ── */
.health{margin:0 16px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;display:flex;align-items:center;gap:14px}
.h-ring{position:relative;width:54px;height:54px;flex-shrink:0}
.h-ring svg{transform:rotate(-90deg)}
.h-score{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900}
.h-info{flex:1}
.h-title{font-size:14px;font-weight:700;margin-bottom:2px}
.h-sub{font-size:11px;color:var(--text2);line-height:1.4}

/* ── SECTION LABEL ── */
.slbl{font-size:10px;font-weight:800;color:rgba(255,255,255,.5);letter-spacing:.12em;text-transform:uppercase;padding:14px 16px 8px}

/* ── CARDS SCROLL ── */
.hscroll{display:flex;gap:12px;padding:0 16px 6px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.hscroll::-webkit-scrollbar{display:none}
.dcard{
  background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:15px;min-width:155px;max-width:155px;flex-shrink:0;
  cursor:pointer;transition:transform .18s;position:relative;overflow:hidden;
}
.dcard:active{transform:scale(.94)}
.dcard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.dcard-ico{width:38px;height:38px;border-radius:12px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:19px}
.dcard-bdg{font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px}
.dcard-name{font-size:13px;font-weight:700;line-height:1.3;margin-bottom:3px;letter-spacing:-.1px}
.dcard-who{font-size:10px;color:var(--blue);font-weight:600;margin-bottom:2px}
.dcard-meta{font-size:10px;color:var(--text2)}
.dcard-bar{position:absolute;bottom:0;left:0;right:0;height:3px}
.dcard-fill{height:100%;transition:width .6s ease}

/* ── LIST ITEMS ── */
.dlist{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.ditem{display:flex;align-items:center;gap:12px;padding:13px 15px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--border)}
.ditem:last-child{border-bottom:none}
.ditem:active{background:var(--card2)}
.dstripe{width:3px;height:40px;border-radius:2px;flex-shrink:0}
.dico{width:40px;height:40px;background:var(--card2);border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.dinf{flex:1;min-width:0}
.dname{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dwho{font-size:10px;color:var(--blue);font-weight:600;margin-top:1px}
.dmeta{font-size:11px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dbdg{font-size:11px;font-weight:700;padding:4px 10px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.br{background:rgba(255,77,106,.13);color:var(--red)}
.bo{background:rgba(255,154,60,.13);color:var(--orange)}
.bg{background:rgba(45,216,138,.1);color:var(--green)}

/* ── SEARCH ── */
.srch-wrap{padding:8px 16px 0;position:relative}
.srch-ico{position:absolute;left:28px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none}
.srch-in{
  width:100%;background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:12px 14px 12px 40px;
  font-size:15px;color:var(--text);font-family:'Outfit',sans-serif;
  outline:none;transition:border .2s;-webkit-appearance:none;
}
.srch-in:focus{border-color:var(--blue)}
.srch-in::placeholder{color:var(--text2)}

/* ── FILTER ROW ── */
.frow{display:flex;gap:8px;padding:8px 16px 4px;overflow-x:auto;scrollbar-width:none}
.frow::-webkit-scrollbar{display:none}
.fchip{background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.12);border-radius:20px;padding:5px 13px;font-size:11px;font-weight:700;color:rgba(255,255,255,.65);cursor:pointer;white-space:nowrap;transition:all .15s;font-family:'Outfit',sans-serif;flex-shrink:0}
.fchip:active{transform:scale(.92)}
.fchip.on{background:rgba(75,123,245,.14);border-color:var(--blue);color:var(--blue)}

/* ── FORM ── */
.fblock{margin-bottom:11px}
.flbl{font-size:10px;font-weight:800;color:rgba(255,255,255,.75);text-transform:uppercase;letter-spacing:.12em;margin-bottom:7px;display:block}
.finput{
  width:100%;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);
  border-radius:14px;padding:13px 15px;font-size:16px;color:#EEF2FF;
  font-family:'Outfit',sans-serif;outline:none;transition:border .2s;
  -webkit-appearance:none;
}
.finput:focus{border-color:var(--blue);background:rgba(75,123,245,.08);box-shadow:0 0 0 3px rgba(75,123,245,.15)}
/* Remove native search field styling on iOS/Safari */
input[type="search"]{-webkit-appearance:none;appearance:none}
input[type="search"]::-webkit-search-decoration,
input[type="search"]::-webkit-search-cancel-button,
input[type="search"]::-webkit-search-results-button,
input[type="search"]::-webkit-search-results-decoration{display:none}
.finput::placeholder{color:rgba(255,255,255,.25)}
textarea.finput{resize:none;min-height:80px;line-height:1.5}

/* contact row */
.crow{display:flex;gap:8px}
.crow .finput{flex:1}
.cact{width:46px;height:46px;background:var(--card);border:1px solid var(--border);border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:19px;cursor:pointer;flex-shrink:0;transition:all .15s;align-self:flex-end}
.cact:active{transform:scale(.9);background:var(--card2)}

/* cat grid */
.cgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:14px}
.cbtn{background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:14px;padding:11px 4px;text-align:center;cursor:pointer;transition:all .15s;position:relative}
.cbtn:active{transform:scale(.9)}
.cbtn.sel{border-color:var(--blue);background:rgba(75,123,245,.18);box-shadow:0 0 0 3px rgba(75,123,245,.12)}
.cbtn-ico{font-size:19px;margin-bottom:3px}
.cbtn-nm{font-size:9px;font-weight:800;color:rgba(255,255,255,.7);letter-spacing:.02em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 2px}
.cbtn.sel .cbtn-nm{color:#7C9EFF;font-weight:900}
.cbtn-edit{position:absolute;top:3px;right:3px;font-size:9px;color:var(--text2);opacity:0}
.cbtn:hover .cbtn-edit{opacity:1}

/* reminder chips */
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:6px 13px;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .15s;font-family:'Outfit',sans-serif}
.chip:active{transform:scale(.92)}
.chip.on{background:rgba(75,123,245,.13);border-color:var(--blue);color:var(--blue)}

/* ── BUTTONS ── */
.btn{width:100%;padding:15px;border-radius:16px;font-size:15px;font-weight:700;font-family:'Outfit',sans-serif;border:none;cursor:pointer;transition:all .18s;letter-spacing:.01em}
.btn:active{transform:scale(.97);opacity:.9}
.btn-p{background:var(--grad);color:#fff;box-shadow:0 8px 28px rgba(75,123,245,.3)}
.btn-s{background:var(--card);border:1px solid var(--border);color:var(--text)}
.btn-d{background:rgba(255,77,106,.1);border:1px solid rgba(255,77,106,.22);color:var(--red)}
.btn+.btn{margin-top:9px}

/* ── DETAIL ── */
.det-hero{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:11px;display:flex;align-items:center;gap:14px}
.det-bigico{width:64px;height:64px;background:var(--card2);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:34px;flex-shrink:0}
.det-name{font-size:21px;font-weight:900;letter-spacing:-.4px;line-height:1.2}
.det-who{font-size:12px;color:var(--blue);font-weight:700;margin-top:3px}
.det-cat{font-size:11px;color:var(--text2);margin-top:2px}

.exp-block{border-radius:var(--r);padding:17px;margin-bottom:11px;display:flex;align-items:center;gap:14px}
.exp-block.r{background:rgba(255,77,106,.09);border:1px solid rgba(255,77,106,.2)}
.exp-block.o{background:rgba(255,154,60,.09);border:1px solid rgba(255,154,60,.2)}
.exp-block.g{background:rgba(45,216,138,.06);border:1px solid rgba(45,216,138,.16)}
.exp-n{font-size:46px;font-weight:900;line-height:1;letter-spacing:-.03em}
.exp-n.r{color:var(--red)}.exp-n.o{color:var(--orange)}.exp-n.g{color:var(--green)}
.exp-l{font-size:10px;color:var(--text2)}
.exp-date{font-size:14px;font-weight:700}
.exp-note{font-size:11px;color:var(--text2);margin-top:3px}
.dbar{height:4px;background:var(--border);border-radius:2px;margin-top:9px;overflow:hidden}
.dfill{height:100%;border-radius:2px;transition:width .6s ease}

.icard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:11px}
.irow{display:flex;justify-content:space-between;align-items:center;padding:12px 15px;border-bottom:1px solid var(--border)}
.irow:last-child{border-bottom:none}
.ik{font-size:11px;color:var(--text2)}
.iv{font-size:13px;font-weight:600;text-align:right;max-width:62%;word-break:break-word}
.ilink{color:var(--blue);text-decoration:none}

.note-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 15px;margin-bottom:11px}
.note-lbl{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.note-txt{font-size:13px;color:var(--text);line-height:1.6;white-space:pre-wrap}

.ccard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 15px;margin-bottom:11px}
.ccard-ttl{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:11px}
.cacts{display:flex;gap:9px}
.cact-btn{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:13px;padding:11px 6px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:all .15s;text-decoration:none}
.cact-btn:active{transform:scale(.93);background:var(--card3)}
.cact-ico{font-size:21px}
.cact-lbl{font-size:9px;font-weight:700;color:var(--text2);letter-spacing:.04em;text-transform:uppercase}

/* ── EMPTY ── */
.empty{display:flex;flex-direction:column;align-items:center;padding:60px 28px;text-align:center;gap:11px}
.empty-ico{font-size:48px;margin-bottom:4px}
.empty-ttl{font-size:19px;font-weight:800}
.empty-sub{font-size:13px;color:var(--text2);line-height:1.6}

/* ── SETTINGS ── */
.sgrp{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.srow{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.srow:last-child{border-bottom:none}
.srow:active{background:var(--card2)}
.srow-l{display:flex;align-items:center;gap:11px}
.sico{width:33px;height:33px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px}
.slbl2{font-size:14px;font-weight:600}
.ssub{font-size:11px;color:var(--text2);margin-top:1px}
.sarr{color:var(--text2);font-size:14px}
.sval{font-size:12px;color:var(--blue);font-weight:700}

/* lang grid */
.lgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.lbtn{background:var(--card);border:1.5px solid var(--border);border-radius:13px;padding:10px 4px;text-align:center;cursor:pointer;transition:all .15s}
.lbtn:active{transform:scale(.92)}
.lbtn.sel{border-color:var(--blue);background:rgba(75,123,245,.1)}
.lflag{font-size:20px;margin-bottom:3px}
.lname{font-size:9px;font-weight:700;color:var(--text2)}
.lbtn.sel .lname{color:var(--blue)}

/* cat manager */
.cat-mgr{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.cat-mgr-item{display:flex;align-items:center;gap:11px;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.cat-mgr-item:last-child{border-bottom:none}
.cat-mgr-item:active{background:var(--card2)}
.cat-mgr-ico{width:34px;height:34px;background:var(--card2);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.cat-mgr-name{flex:1;font-size:14px;font-weight:600}
.cat-mgr-count{font-size:11px;color:var(--text2)}

/* icon picker */
.icon-picker{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;max-height:220px;overflow-y:auto;padding:4px}
.icon-opt{width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:20px;border-radius:10px;cursor:pointer;transition:all .15s;border:1.5px solid transparent}
.icon-opt:active{transform:scale(.88)}
.icon-opt.sel{border-color:var(--blue);background:rgba(75,123,245,.14)}

/* ── TOAST ── */
#toast{position:fixed;bottom:86px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);border:1px solid var(--border2);border-radius:14px;padding:11px 20px;font-size:13px;font-weight:700;white-space:nowrap;z-index:300;opacity:0;transition:all .28s;pointer-events:none;max-width:92vw;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.6)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── SHEET MODAL ── */
.sheet-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;
  display:flex;align-items:flex-end;
  opacity:0;pointer-events:none;transition:opacity .22s ease;
}
.sheet-bg.open{opacity:1;pointer-events:all;}
.sheet{
  background:var(--card);border-radius:28px 28px 0 0;
  padding:20px 18px calc(20px + var(--safe));width:100%;
  max-height:82vh;overflow-y:auto;
  transform:translateY(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);
}
.sheet-bg.open .sheet{transform:translateY(0);}
.sh-handle{width:36px;height:4px;background:var(--text3);border-radius:2px;margin:0 auto 20px}
.sh-title{font-size:17px;font-weight:800;margin-bottom:5px}
.sh-sub{font-size:13px;color:var(--text2);margin-bottom:18px;line-height:1.5}

/* ── ONBOARDING ── */
#ob{position:fixed;inset:0;z-index:400;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:44px 26px calc(36px + var(--safe));background:var(--bg);text-align:center}
.ob-mark{width:96px;height:96px;background:var(--grad);border-radius:calc(96px*.235);display:flex;align-items:center;justify-content:center;box-shadow:0 24px 64px rgba(75,123,245,.55);position:relative;overflow:hidden;margin-bottom:18px}
.ob-mark::after{content:'';position:absolute;inset:0;background:linear-gradient(145deg,rgba(255,255,255,.22) 0%,transparent 55%)}
.ob-brand{font-size:40px;font-weight:900;letter-spacing:-.06em;margin-bottom:5px}
.ob-tag{font-size:13px;color:var(--text2);line-height:1.55;margin-bottom:30px}
.ob-feats{display:flex;flex-direction:column;gap:9px;width:100%;text-align:left;margin-bottom:28px}
.ob-feat{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:15px;padding:13px 14px;border:1px solid var(--border)}
.ob-feat-ico{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ob-feat-b b{display:block;font-size:13px;font-weight:700;margin-bottom:1px}
.ob-feat-b span{font-size:11px;color:var(--text2)}
.ob-name{width:100%;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 15px;font-size:16px;color:var(--text);font-family:'Outfit',sans-serif;outline:none;margin-bottom:14px;text-align:center;transition:border .2s}
.ob-name:focus{border-color:var(--blue)}
.ob-name::placeholder{color:var(--text2)}

/* install */
#inst-banner{margin:0 16px 10px;background:linear-gradient(135deg,rgba(75,123,245,.13),rgba(124,92,252,.08));border:1px solid rgba(75,123,245,.22);border-radius:15px;padding:12px 14px;display:flex;align-items:center;gap:11px}
#inst-banner.hidden{display:none}
.inst-txt{flex:1;font-size:12px;line-height:1.5}
.inst-txt b{color:var(--blue)}
.inst-x{font-size:15px;color:var(--text2);cursor:pointer;padding:3px;flex-shrink:0}
</style>
</head>
<body>
<div class="amb amb-1"></div>
<div class="amb amb-2"></div>

<!-- ═══════════════ ONBOARDING ═══════════════ -->
<div id="ob">
  <div class="ob-mark">
    <svg width="54" height="54" viewBox="0 0 56 56" fill="none">
      <path d="M28 6L8 14v14c0 10 7.5 19.3 20 22 12.5-2.7 20-12 20-22V14L28 6z" fill="white" opacity=".12"/>
      <path d="M28 6L8 14v14c0 10 7.5 19.3 20 22 12.5-2.7 20-12 20-22V14L28 6z" stroke="white" stroke-width="1.6" fill="none" opacity=".4"/>
      <rect x="17" y="26" width="22" height="16" rx="4" fill="white" opacity=".95"/>
      <path d="M20 26v-5a8 8 0 0 1 16 0v5" stroke="white" stroke-width="2.8" fill="none" stroke-linecap="round"/>
      <circle cx="28" cy="33" r="3.2" fill="#7C5CFC"/>
      <rect x="26.6" y="33" width="2.8" height="4" rx="1.2" fill="#7C5CFC"/>
    </svg>
  </div>
  <div class="ob-brand">keepo</div>
  <div class="ob-tag" id="ob-tag"></div>
  <div class="ob-feats">
    <div class="ob-feat"><div class="ob-feat-ico" style="background:rgba(75,123,245,.14)"><svg width="22" height="22" viewBox="0 0 56 56" fill="none"><rect x="17" y="26" width="22" height="16" rx="4" fill="#4B7BF5"/><path d="M20 26v-5a8 8 0 0 1 16 0v5" stroke="#4B7BF5" stroke-width="3" fill="none" stroke-linecap="round"/><circle cx="28" cy="33" r="3" fill="white"/></svg></div><div class="ob-feat-b"><b id="ob-f1"></b><span id="ob-f1s"></span></div></div>
    <div class="ob-feat"><div class="ob-feat-ico" style="background:rgba(45,216,138,.11)">🔔</div><div class="ob-feat-b"><b id="ob-f2"></b><span id="ob-f2s"></span></div></div>
    <div class="ob-feat"><div class="ob-feat-ico" style="background:rgba(255,154,60,.11)">🔒</div><div class="ob-feat-b"><b id="ob-f3"></b><span id="ob-f3s"></span></div></div>
  </div>
  <input class="ob-name" id="ob-name" type="text" autocomplete="given-name">
  <button class="btn btn-p" id="ob-btn" onclick="startApp()"></button>
</div>

<!-- ═══════════════ APP ═══════════════ -->
<div id="app" style="display:none">

  <!-- HOME -->
  <div class="view active" id="view-home">
    <div class="scroll" id="home-scroll" style="padding:0 0 110px">
      <div class="topbar">
        <div class="logo-row">
          <div class="k-mark" style="--ksz:33px"><svg width="18" height="18" viewBox="0 0 56 56" fill="none"><rect x="17" y="26" width="22" height="16" rx="4" fill="white" opacity=".95"/><path d="M20 26v-5a8 8 0 0 1 16 0v5" stroke="white" stroke-width="3.2" fill="none" stroke-linecap="round"/><circle cx="28" cy="33" r="3.2" fill="#7C5CFC"/></svg></div>
          <div class="logo-name">keepo</div>
        </div>
        <div class="topbar-right">
          <div class="ico-btn" onclick="showView('settings')">⚙️</div>
          <div class="ico-btn" onclick="showView('add')">＋</div>
        </div>
      </div>
      <div id="inst-banner" class="hidden"><div class="inst-txt"><b id="inst-t">Install keepo</b> — <span id="inst-s">Share → Add to Home Screen</span></div><div class="inst-x" onclick="dismissInstall()">✕</div></div>
      <div id="home-body"></div>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="view" id="view-search">
    <div class="topbar">
      <div><div style="font-size:21px;font-weight:900;letter-spacing:-.4px" id="srch-ttl"></div><div id="srch-cnt" style="font-size:11px;color:var(--text2);margin-top:2px"></div></div>
      <div class="ico-btn" onclick="showView('add')">＋</div>
    </div>
    <div class="srch-wrap"><span class="srch-ico">🔍</span><input class="srch-in" id="srch-in" type="search" oninput="renderSearch()"></div>
    <div class="frow" id="frow-cat"></div>
    <div class="frow" id="frow-who" style="padding-top:0"></div>
    <div class="scroll pad"><div id="srch-body"></div></div>
  </div>

  <!-- ADD -->
  <div class="view" id="view-add">
    <div class="back-row" onclick="goBack()"><div class="ba">←</div><div class="back-ttl" id="add-ttl"></div></div>
    <div class="scroll pad">
      <div class="fblock">
        <label class="flbl" id="lbl-cat"></label>
        <div class="cgrid" id="cgrid"></div>
        <div id="add-cat-inline-btn" onclick="addNewCatFromAdd()" style="display:flex;align-items:center;justify-content:center;gap:7px;background:var(--card);border:1.5px dashed rgba(75,123,245,.6);border-radius:14px;padding:10px;font-size:12px;font-weight:700;color:var(--blue);cursor:pointer;transition:all .15s;margin-top:2px">＋ <span id="lbl-add-cat-inline">New category</span></div>
      </div>
      <div class="fblock"><label class="flbl" id="lbl-name"></label><textarea class="finput" id="f-name" rows="1" autocomplete="off" autocorrect="off" spellcheck="false" style="resize:none;overflow:hidden;line-height:1.4"></textarea></div>
      <div class="fblock"><label class="flbl" id="lbl-who"></label><textarea class="finput" id="f-who" rows="1" autocomplete="off" autocorrect="off" spellcheck="false" style="resize:none;overflow:hidden;line-height:1.4"></textarea></div>
      <div class="fblock"><label class="flbl" id="lbl-exp"></label><input class="finput" id="f-exp" type="date"></div>
      <div class="fblock"><label class="flbl" id="lbl-prov"></label><textarea class="finput" id="f-prov" rows="1" autocomplete="off" autocorrect="off" spellcheck="false" style="resize:none;overflow:hidden;line-height:1.4"></textarea></div>
      <div class="fblock"><label class="flbl" id="lbl-contact-name"></label>
        <div class="crow"><input class="finput" id="f-contact-name" type="text" autocomplete="name" autocorrect="off" spellcheck="false"><div class="cact" onclick="pickContact()" title="Pick from contacts">👤</div></div>
      </div>
      <div class="fblock"><label class="flbl" id="lbl-phone"></label><input class="finput" id="f-phone" type="text" inputmode="tel" autocomplete="off"></div>
      <div class="fblock"><label class="flbl" id="lbl-web"></label>
        <div class="crow"><input class="finput" id="f-web" type="search" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="darty.com, axa.fr…"><div class="cact" onclick="searchOnline()" title="Search">🌐</div></div>
      </div>
      <div class="fblock">
        <label class="flbl" id="lbl-attach"></label>
        <div id="attach-preview" style="display:none;position:relative;margin-bottom:10px">
          <img id="attach-img" style="width:100%;border-radius:12px;max-height:220px;object-fit:cover;display:none">
          <div id="attach-pdf" style="display:none;background:rgba(255,255,255,.06);border-radius:12px;padding:16px;text-align:center;font-size:13px;color:var(--text)">📄 <span id="attach-pdf-name"></span></div>
          <div onclick="removeAttach()" style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px">✕</div>
        </div>
        <div id="attach-btns" style="display:flex;gap:8px">
          <label for="f-photo" style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;background:rgba(255,255,255,.05);border:1.5px dashed rgba(255,255,255,.15);border-radius:14px;padding:13px;font-size:12px;font-weight:700;color:rgba(255,255,255,.6);cursor:pointer">
            📷 <span id="lbl-take-photo">Photo</span>
            <input type="file" id="f-photo" accept="image/*" capture="environment" style="display:none" onchange="handleAttach(this)">
          </label>
          <label for="f-file" style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;background:rgba(255,255,255,.05);border:1.5px dashed rgba(255,255,255,.15);border-radius:14px;padding:13px;font-size:12px;font-weight:700;color:rgba(255,255,255,.6);cursor:pointer">
            📎 <span id="lbl-pick-file">Fichier</span>
            <input type="file" id="f-file" accept="image/*,application/pdf" style="display:none" onchange="handleAttach(this)">
          </label>
        </div>
      </div>
      <div class="fblock"><label class="flbl" id="lbl-note"></label><textarea class="finput" id="f-note" rows="3"></textarea></div>
      <div class="fblock"><label class="flbl" id="lbl-rem"></label><div class="chips" id="rem-chips"></div></div>
      <div style="height:8px"></div>
      <button class="btn btn-p" onclick="saveDoc()"><span id="save-lbl"></span></button>
      <button class="btn btn-s" onclick="goBack()"><span id="cancel-lbl"></span></button>
    </div>
  </div>

    <button class="nb" id="nb-settings" onclick="showView('settings')"><div class="nb-pip"><div class="nb-ico">⚙️</div></div><div class="nb-lbl" id="nb-sett-l"></div></button>
  </div></nav>
</div>

<!-- TOAST -->
<div id="toast"></div>

<div class="sheet-bg" id="conf-bg" onclick="closeSheet()">

    <div style="height:6px"></div>

    <button class="btn btn-s" onclick="closeCatSheet()" id="cat-sh-cancel" style="margin-top:9px">Cancel</button>
  </div>
</div>

const SK='kp_docs_v2', CK='kp_cats_v2', LK='kp_lang', NK='kp_name', FK='kp_launched';

let lang=localStorage.getItem(LK)||'en';
let userName=localStorage.getItem(NK)||'';

// ═══════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════
function t(k){return(T[lang]&&T[lang][k])||T.en[k]||k}
function loadDocs(){try{return JSON.parse(localStorage.getItem(SK))||[]}catch{return[]}}
function saveDocs(d){
  try{
    const json=JSON.stringify(d);
    localStorage.setItem(SK,json);
  }catch(e){
    if(e.name==='QuotaExceededError'||e.code===22){
      toast('⚠️ Stockage plein — réduisez les pièces jointes');
      // Try saving without attachments only as last resort
      const stripped=d.map(doc=>({...doc,attach:null}));
      try{localStorage.setItem(SK,JSON.stringify(stripped));}catch(e2){
        toast('❌ Impossible de sauvegarder');
      }
    } else {
      toast('❌ Erreur: '+e.message);
    }
  }
}
function addDoc(d){const docs=loadDocs();d.id=Date.now().toString(36);d.created=new Date().toISOString();docs.push(d);saveDocs(docs);return d}
function delDoc(id){saveDocs(loadDocs().filter(d=>d.id!==id))}
function loadCats(){
  try{
    const c=JSON.parse(localStorage.getItem(CK));
    if(c&&c.length){
      // Re-translate default categories dynamically on every load
      return c.map(cat=>{
        const def=DEFAULT_CATS.find(d=>d.id===cat.id);
        if(def&&cat.isDefault!==false){
          // It's a default cat — always use current language name
          return {...cat,name:def.name[lang]||def.name.en,icon:cat.icon||def.icon};
        }
        return cat; // custom cat — keep user-defined name
      });
    }
  }catch{}
  // First launch — create defaults with isDefault flag
  return DEFAULT_CATS.map(c=>({id:c.id,icon:c.icon,name:c.name[lang]||c.name.en,isDefault:true}));
}
function saveCats(c){localStorage.setItem(CK,JSON.stringify(c))}
function getCat(id){return loadCats().find(c=>c.id===id)||{id:'other',icon:'📄',name:'Other'}}
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function daysUntil(s){const n=new Date();n.setHours(0,0,0,0);const e=new Date(s);e.setHours(0,0,0,0);return Math.round((e-n)/86400000)}
function fmtDate(s){return new Date(s).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}
function fDur(d){
  if(d<0)return t('expired');if(d===0)return t('today');
  if(d<30)return d+'d';
  const m=Math.round(d/30);
  return m<12?m+t('months'):Math.round(m/12)+t('years');
}
function stOf(d){
  if(d<=0)return{c:'r',stripe:'var(--red)',cls:'br'};
  if(d<=30)return{c:'r',stripe:'var(--red)',cls:'br'};
  if(d<=90)return{c:'o',stripe:'var(--orange)',cls:'bo'};
  return{c:'g',stripe:'var(--green)',cls:'bg'};
}
function greeting(){
  const h=new Date().getHours();
  return t('greeting')+' '+(h<12?t('morning'):h<18?t('afternoon'):t('evening'));
}
function getWhoList(){
  const docs=loadDocs();
  const set=new Set();
  docs.forEach(d=>{if(d.who&&d.who.trim())set.add(d.who.trim())});
  return [...set].sort();
}
function offsetDate(d){const t=new Date();t.setDate(t.getDate()+d);return t.toISOString().split('T')[0]}

// ═══════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════
function showView(name){
  prev=cur;cur=name;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  const v=document.getElementById('view-'+name);
  if(v)v.classList.add('active');
  const nb=document.getElementById('nb-'+name);
  if(nb)nb.classList.add('on');
  if(name==='home')renderHome();
  if(name==='search'){applyLabels();renderSearch();}
  if(name==='add'){applyLabels();renderAdd();}
  if(name==='settings'){applyLabels();renderSettings();}
  const sc=v&&v.querySelector('.scroll');
  if(sc)sc.scrollTop=0;
}
function goBack(){showView(prev===cur||prev==='detail'?'home':prev)}

function applyLabels(){
  const s=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v};
  const p=(id,v)=>{const e=document.getElementById(id);if(e)e.placeholder=v};
  s('nb-home-l',t('home'));s('nb-srch-l',t('search'));s('nb-add-l',t('add'));s('nb-sett-l',t('settings'));
  s('add-ttl',t('add_doc'));s('lbl-cat',t('category'));s('lbl-name',t('doc_name'));
  s('lbl-who',t('belongs_to'));s('lbl-exp',t('expiry'));s('lbl-prov',t('provider'));
  s('lbl-phone',t('phone'));s('lbl-web',t('website'));s('lbl-note',t('note'));
  s('lbl-rem',t('remind'));s('save-lbl',t('save'));s('cancel-lbl',t('cancel'));
  s('det-back-lbl',t('document'));s('sett-ttl',t('settings'));s('srch-ttl',t('search'));
  s('inst-t',t('install_t'));s('inst-s',t('install_s'));
  p('srch-in',t('search_placeholder'));
  s('lbl-contact-name',t('contact_name'));
  s('lbl-attach',t('attach'));
  s('lbl-take-photo',t('take_photo'));
  s('lbl-pick-file',t('pick_file'));
  p('f-contact-name',t('contact_name_ph')||'Contact name…');
  s('lbl-add-cat-inline',t('add_cat').replace('＋ ',''));
  p('f-name',t('doc_name')+'…');p('f-who',t('belongs_to')+'…');
  p('f-prov',t('provider')+'…');
}

// ═══════════════════════════════════════
// HOME
// ═══════════════════════════════════════
function renderHome(){
  applyLabels();
  const docs=loadDocs().map(d=>({...d,days:daysUntil(d.expiry)})).sort((a,b)=>a.days-b.days);
  const el=document.getElementById('home-body');if(!el)return;
  const urgent=docs.filter(d=>d.days<=30);
  const soon=docs.filter(d=>d.days>30&&d.days<=90);
  const ok=docs.filter(d=>d.days>90);
  const total=docs.length;
  const score=total===0?100:Math.round(((ok.length*100)+(soon.length*60))/total);
  const sc=score>=80?'var(--green)':score>=50?'var(--orange)':'var(--red)';
  const hm=score>=90?t('health_perfect'):score>=60?t('health_good'):score>=30?t('health_warn'):t('health_crit');
  let h='';

  if(total===0){
    h=`<div class="hero"><div class="hero-greet">${greeting()}${userName?', '+userName:''}  👋</div><div class="hero-msg">Welcome to keepo ✨</div><div style="font-size:13px;opacity:.8">${t('no_docs_sub')}</div></div>
    <div style="padding:0 16px"><button class="btn btn-p" onclick="showView('add')" style="margin-top:4px">＋ ${t('add_doc')}</button></div>`;
    el.innerHTML=h;return;
  }

  // Hero
  h+=`<div class="hero">
    <div class="hero-greet">${greeting()}${userName?', '+userName:''}  👋</div>
    <div class="hero-msg">${urgent.length>0?urgent.length+' doc'+(urgent.length>1?'s':'')+' need'+(urgent.length===1?'s':'')+' attention':t('health_perfect')+' ✨'}</div>
    <div class="hero-row">
      <div class="hero-stat"><div class="hero-n">${urgent.length}</div><div class="hero-l">${t('urgent')}</div></div>
      <div class="hero-stat"><div class="hero-n">${soon.length}</div><div class="hero-l">${t('soon')}</div></div>
      <div class="hero-stat"><div class="hero-n">${ok.length}</div><div class="hero-l">${t('valid')}</div></div>
    </div>
  </div>`;

  // Health ring
  const circ=2*Math.PI*21;
  const offset=circ*(1-score/100);
  h+=`<div class="health">
    <div class="h-ring">
      <svg width="54" height="54" viewBox="0 0 54 54">
        <circle cx="27" cy="27" r="21" fill="none" stroke="var(--card2)" stroke-width="4.5"/>
        <circle cx="27" cy="27" r="21" fill="none" stroke="${sc}" stroke-width="4.5"
          stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"
          stroke-linecap="round" style="transition:stroke-dashoffset .8s ease"/>
      </svg>
      <div class="h-score" style="color:${sc}">${score}</div>
    </div>
    <div class="h-info"><div class="h-title">${t('vault_health')}</div><div class="h-sub">${hm}</div></div>
  </div>`;

  // Urgent cards
  if(urgent.length>0){
    h+=`<div class="slbl">🔴 ${t('urgent')}</div><div class="hscroll">`;
    urgent.forEach(d=>{
      const cat=getCat(d.category);
      const pct=Math.max(4,Math.min(100,(Math.max(0,d.days)/30)*100));
      h+=`<div class="dcard" onclick="openDetail('${d.id}')">
        <div class="dcard-top"><div class="dcard-ico">${cat.icon}</div><div class="dcard-bdg br">${fDur(d.days)}</div></div>
        ${d.who?`<div class="dcard-who">${escH(d.who)}</div>`:''}
        <div class="dcard-name">${escH(d.name)}</div>
        <div class="dcard-meta">${escH(d.prov||cat.name)}</div>
        <div class="dcard-bar"><div class="dcard-fill" style="width:${pct}%;background:${d.days<=7?'var(--red)':'var(--orange)'}"></div></div>
      </div>`;
    });
    h+=`</div>`;
  }

  // Soon cards
  if(soon.length>0){
    h+=`<div class="slbl">🟡 ${t('soon')}</div><div class="hscroll">`;
    soon.forEach(d=>{
      const cat=getCat(d.category);
      const pct=Math.max(4,Math.min(100,(d.days/90)*100));
      h+=`<div class="dcard" onclick="openDetail('${d.id}')">
        <div class="dcard-top"><div class="dcard-ico">${cat.icon}</div><div class="dcard-bdg bo">${fDur(d.days)}</div></div>
        ${d.who?`<div class="dcard-who">${escH(d.who)}</div>`:''}
        <div class="dcard-name">${escH(d.name)}</div>
        <div class="dcard-meta">${escH(d.prov||cat.name)}</div>
        <div class="dcard-bar"><div class="dcard-fill" style="width:${pct}%;background:var(--orange)"></div></div>
      </div>`;
    });
    h+=`</div>`;
  }

  // Valid list
  if(ok.length>0){
    h+=`<div class="slbl">✅ ${t('valid')}</div><div style="padding:0 16px"><div class="dlist">`;
    ok.slice(0,5).forEach(d=>h+=dItem(d));
    h+=`</div>`;
    if(ok.length>5)h+=`<div style="text-align:center;padding:12px 0;font-size:13px;font-weight:600;color:var(--blue);cursor:pointer" onclick="showView('search')">View all ${ok.length} →</div>`;
    h+=`</div>`;
  }

  el.innerHTML=h;
}

function dItem(d){
  const cat=getCat(d.category),st=stOf(d.days);
  return `<div class="ditem" onclick="openDetail('${d.id}')">
    <div class="dstripe" style="background:${st.stripe}"></div>
    <div class="dico">${cat.icon}</div>

function handleAttach(input){
  const file=input.files[0];
  if(!file)return;
  // Max 2MB
  if(file.size>2*1024*1024){toast('⚠️ '+t('attach_size'));input.value='';return;}
  const isPdf=file.type==='application/pdf';
  const reader=new FileReader();
  reader.onload=function(e){
    if(isPdf){
      attachData={type:'pdf',data:e.target.result,name:file.name};
      document.getElementById('attach-pdf-name').textContent=file.name;
      document.getElementById('attach-pdf').style.display='block';
      document.getElementById('attach-img').style.display='none';
      const kbPdf=Math.round(file.size/1024);
      toast('✅ PDF ajouté ('+kbPdf+'KB)');
    } else {
      // Compress image before storing
      compressImage(e.target.result, 500, 0.55, function(compressed){
        attachData={type:'image',data:compressed,name:file.name};
        document.getElementById('attach-img').src=compressed;
        document.getElementById('attach-img').style.display='block';
        document.getElementById('attach-pdf').style.display='none';
        const kb=Math.round(compressed.length*0.75/1024);
        toast('✅ Photo ajoutée ('+kb+'KB)');
      });
    }
    document.getElementById('attach-preview').style.display='block';
    document.getElementById('attach-btns').style.display='none';
  };
  reader.readAsDataURL(file);
  input.value='';
}

function compressImage(dataUrl, maxW, quality, cb){
  const img=new Image();
  img.onload=function(){
    const scale=Math.min(1, maxW/img.width);
    const w=Math.round(img.width*scale);
    const h=Math.round(img.height*scale);
    const canvas=document.createElement('canvas');
    canvas.width=w; canvas.height=h;
    canvas.getContext('2d').drawImage(img,0,0,w,h);
    cb(canvas.toDataURL('image/jpeg',quality));
  };
  img.src=dataUrl;
}

function removeAttach(){
  attachData=null;
  document.getElementById('attach-preview').style.display='none';
  document.getElementById('attach-btns').style.display='flex';
  document.getElementById('attach-img').src='';
}

function resetAttach(){
  removeAttach();
}

function loadAttach(doc){
  if(doc.attach){
    attachData=doc.attach;
    if(doc.attach.type==='image'){
      document.getElementById('attach-img').src=doc.attach.data;
      document.getElementById('attach-img').style.display='block';
      document.getElementById('attach-pdf').style.display='none';
    } else {
      document.getElementById('attach-pdf-name').textContent=doc.attach.name||'document.pdf';
      document.getElementById('attach-pdf').style.display='block';
      document.getElementById('attach-img').style.display='none';
    }
    document.getElementById('attach-preview').style.display='block';
    document.getElementById('attach-btns').style.display='none';
  } else {
    resetAttach();
  }
}

function saveCatEdit(){
  const name=(document.getElementById('cat-sh-name').value||'').trim();
  if(!name){toast('⚠️ Enter a name');return}
  const cats=loadCats();
  const idx=cats.findIndex(c=>c.id===editingCatId);
  if(idx>=0){
    cats[idx].icon=selIcon;
    cats[idx].name=name;
    // If user renamed a default cat, mark it as no longer auto-translatable
    const isDef=DEFAULT_CATS.find(d=>d.id===editingCatId);
    if(isDef){
      const defName=isDef.name[lang]||isDef.name.en;
      // Only mark custom if name actually differs from default translation
      cats[idx].isDefault=(name===defName);
    }
  }
  else cats.push({id:editingCatId,icon:selIcon,name,isDefault:false});
  saveCats(cats);
  closeCatSheet();
  if(catSheetReturnToAdd){
    // Auto-select the new/edited category and return to Add form
    selCat=editingCatId;
    buildCatGrid();
    toast('✅ '+name+' — '+t('cat_save'));
  } else {
    renderSettings();
    buildCatGrid();
    toast('✅ '+t('cat_save'));
  }
}

function deleteCatEdit(){
  const cats=loadCats();
  const remaining=cats.filter(c=>c.id!==editingCatId);
  if(remaining.length===0){toast('⚠️ Keep at least one category');return}
  const docs=loadDocs();
  const inUse=docs.filter(d=>d.category===editingCatId).length;
  if(inUse>0){
    // Move docs to first remaining category before deleting
    const fallback=remaining[0].id;
    const updated=docs.map(d=>d.category===editingCatId?{...d,category:fallback}:d);
    saveDocs(updated);
  }
  saveCats(remaining);
  closeCatSheet();
  renderSettings();
  buildCatGrid();
  toast(inUse>0?'✅ Deleted — '+inUse+' doc(s) moved to '+remaining[0].name:'✅ Category deleted');
}

// Extract clean domain for display
function displayWeb(raw){
  if(!raw)return'';
  const s=raw.trim();
  try{
    // If it's a full URL, extract just the hostname
    const url=s.startsWith('http')?new URL(s):new URL('https://'+s);
    return url.hostname.replace(/^www\./,'');
  }catch{
    // Not a URL - return truncated raw value
    return s.length>30?s.substring(0,28)+'…':s;
  }
}

// Normalize and open any URL/domain the user typed
function openDocWeb(raw){
  if(!raw)return;
  let url=raw.trim();
  // Extract real URL from Google redirect if needed
  if(url.includes('google.com/aclk')||url.includes('google.com/url')){
    try{
      const params=new URL(url).searchParams;
      const real=params.get('adurl')||params.get('q')||params.get('url');
      if(real){url=real;}
    }catch{}
  }
  // Already a full URL
  if(url.startsWith('http://')||url.startsWith('https://')){
    window.open(url,'_blank');return;
  }
  // Looks like a domain (contains a dot, no spaces)
  if(url.includes('.')&&!url.includes(' ')){
    window.open('https://'+url,'_blank');return;
  }
  // Otherwise search for it
  window.open('https://www.google.com/search?q='+encodeURIComponent(url),'_blank');
}

function openAttachFile(docId){
  const doc=loadDocs().find(d=>d.id===docId);
  if(!doc||!doc.attach||!doc.attach.data)return;
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;z-index:9999;background:#000;display:flex;flex-direction:column';
  const bar=document.createElement('div');
  bar.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#111;flex-shrink:0';
  const title=document.createElement('div');
  title.style.cssText='font-size:13px;font-weight:700;color:#fff';
  title.textContent=doc.attach.name||'document.pdf';
  const closeBtn=document.createElement('div');
  closeBtn.textContent='✕';
  closeBtn.style.cssText='font-size:24px;color:#fff;cursor:pointer;padding:4px 8px';
  closeBtn.onclick=function(){ov.remove();};
  bar.appendChild(title);
  bar.appendChild(closeBtn);
  const iframe=document.createElement('iframe');
  iframe.src=doc.attach.data;
  iframe.style.cssText='flex:1;border:none;width:100%;background:#fff';
  ov.appendChild(bar);
  ov.appendChild(iframe);
  document.body.appendChild(ov);
}

function viewFullImg(docId){
  const doc=loadDocs().find(d=>d.id===docId);
  if(!doc||!doc.attach||doc.attach.type!=='image'||!doc.attach.data)return;
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:#000;z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;box-sizing:border-box';
  const img=document.createElement('img');
  img.src=doc.attach.data;
  img.style.cssText='max-width:100%;max-height:90vh;object-fit:contain;border-radius:8px';
  const close=document.createElement('div');
  close.innerHTML='✕';
  close.style.cssText='position:absolute;top:16px;right:16px;font-size:28px;color:#fff;cursor:pointer;background:rgba(0,0,0,.5);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;line-height:1';
  close.onclick=()=>ov.remove();
  ov.onclick=(e)=>{if(e.target===ov)ov.remove()};
  ov.appendChild(img);
  ov.appendChild(close);
  document.body.appendChild(ov);
}
